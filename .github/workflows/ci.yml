name: CI

on:
  push:
    branches-ignore:
      - master
      - main
      - dependabot/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        # actions/checkout@v6.0.0
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        # arduino/setup-task@v2.0.0
        uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run linters
        run: task lint

  build:
    name: Build (verify Dockerfile)
    runs-on: ubuntu-24.04-arm
    needs: [lint]
    steps:
      - name: Checkout
        # actions/checkout@v6.0.0
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Task
        # arduino/setup-task@v2.0.0
        uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Docker Buildx
        # docker/setup-buildx-action@v4.0.0
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build action image (no push)
        run: task docker:build:local
